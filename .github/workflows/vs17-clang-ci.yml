name: VS17-CLANG-CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/!(vs17-clang-ci).yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

# Cancel stale runs on the same branch/PR when a new commit lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: windows-vs17 (${{ matrix.arch }}, ${{ matrix.build_type }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
        build_type: [Release, Debug]
        include:
          - gen: "Visual Studio 17 2022"

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Configure
        run: >
          cmake -S . -B build
          -G "${{ matrix.gen }}"
          -A ${{ matrix.arch }}
          -T ClangCL
          -DENABLE_ROARING_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure --no-tests=error
